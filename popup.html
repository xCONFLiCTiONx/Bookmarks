<!DOCTYPE html>
<html>
  <head>
    <style>
      body { 
        width: 400px; 
        height: 500px; 
        font-family: sans-serif; 
        margin: 0; 
        background-color: #1e1e1e; 
        color: #e0e0e0; 
        display: flex;
        flex-direction: column;
        overflow: hidden; 
      }
      
      /* Hide scrollbar while keeping mouse wheel scroll functional */
      #bookmarkList { 
        overflow-y: auto; 
        flex-grow: 1; 
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none; /* IE and Edge */
      }
      #bookmarkList::-webkit-scrollbar { 
        display: none; /* Chrome, Safari, Opera */
      }

      #nav-row { 
        padding: 8px; 
        background-color: #2a2a2a; 
        border-bottom: 2px solid #333; 
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0; 
      }
      #exportSortBtn {
        background: #444; color: #fff; border: none; padding: 4px 8px; cursor: pointer; border-radius: 3px; font-size: 10px;
      }
      #exportSortBtn:hover { background: #555; }

      ul { list-style: none; padding: 0; margin: 0; }
      li { 
        padding: 9px; cursor: pointer; border-bottom: 1px solid #333; display: flex; align-items: center; 
      }
      li:hover { background-color: #333; }
      
      .folder-icon { 
        width: 18px; height: 13px; background-color: #fbc02d; border-radius: 2px; margin-right: 10px; display: inline-block; flex-shrink: 0; 
      }
    </style>
  </head>
  <body>
    <div id="nav-row">
      <div id="path-container"></div>
      <button id="exportSortBtn">Bookmarks Manager</button>
    </div>
    <ul id="bookmarkList"></ul>
    <script src="popup.js"></script>
  </body>
</html>
