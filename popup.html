<!DOCTYPE html>
<html>
  <head>
    <style>
      body { 
        width: 400px; 
        font-family: sans-serif; 
        margin: 0; 
        background-color: #1e1e1e; 
        color: #e0e0e0; 
      }
      
      #bookmarkList { 
        max-height: 450px;
        overflow-y: auto; 
        scrollbar-width: none; 
        -ms-overflow-style: none; 
      }
      #bookmarkList::-webkit-scrollbar { 
        display: none; 
      }

      #nav-row { 
        padding: 8px; 
        background-color: #2a2a2a; 
        border-bottom: 2px solid #333; 
        font-size: 12px;
        display: flex;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      #path-container {
        flex-grow: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-right: 36px;
      }

      #exportSortBtn {
        background: transparent; 
        color: #aaa; 
        border: none; 
        padding: 4px; 
        cursor: pointer; 
        border-radius: 4px; 
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #exportSortBtn:hover { 
        background: #333; 
        color: #fff; 
      }

      /* Floating bottom-right gear button over the content */
      #footer-row {
        position: absolute;
        bottom: 8px;
        right: 12px;
        z-index: 20;
      }
      #footer-row #exportSortBtn {
        background: #2a2a2a;
        border: 1px solid #444;
        box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        padding: 6px;
      }
      #footer-row #exportSortBtn:hover {
        background: #3a3a3a;
      }

      ul { list-style: none; padding: 0; margin: 0; }
      li { 
        padding: 9px; cursor: pointer; border-bottom: 1px solid #333; display: flex; align-items: center; 
      }
      li:hover { background-color: #333; }
      
      .folder-icon { 
        width: 18px; height: 13px; background-color: #fbc02d; border-radius: 2px; margin-right: 10px; display: inline-block; flex-shrink: 0; 
      }
    </style>
  </head>
  <body>
    <div id="nav-row">
      <div id="path-container"></div>
    </div>
    <ul id="bookmarkList"></ul>
    <div id="footer-row">
      <button id="exportSortBtn" title="Bookmarks Manager">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06-.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
